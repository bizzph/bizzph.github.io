<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Moto Talk Text Offline</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #f8fafc; background: #0b1220; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #0b1220; }
    body { display: flex; justify-content: center; }
    main { width: min(520px, 100%); min-height: 100vh; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .card { background: #111827; border: 1px solid rgba(255,255,255,.09); border-radius: 18px; padding: 14px; box-shadow: 0 18px 46px rgba(0,0,0,.2); }
    h1 { margin: 0 0 10px; font-size: clamp(32px, 10vw, 48px); line-height: .95; }
    button, textarea { width: 100%; border: 0; border-radius: 14px; font: inherit; }
    button { padding: 15px 14px; font-size: 17px; font-weight: 850; color: #e5e7eb; background: #334155; touch-action: manipulation; }
    button.primary { background: #22c55e; color: #052e16; }
    button.blue { background: #38bdf8; color: #082f49; }
    button.red { background: #ef4444; color: white; }
    button.active { outline: 3px solid rgba(255,255,255,.35); filter: brightness(1.12); }
    button:disabled { opacity: .45; }
    textarea { min-height: 190px; padding: 12px; color: #e5e7eb; background: #020617; border: 1px solid rgba(255,255,255,.12); resize: vertical; font-size: 12px; line-height: 1.35; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hidden { display: none !important; }
    #status { padding: 10px 12px; border-radius: 12px; color: #dbeafe; background: rgba(56,189,248,.12); font-weight: 750; }
    #status.good { color: #bbf7d0; background: rgba(34,197,94,.13); }
    #status.warn { color: #fde68a; background: rgba(245,158,11,.13); }
    .talk { height: min(45vh, 330px); border-radius: 999px; font-size: clamp(26px, 8vw, 48px); }
    .talk.on { filter: brightness(1.15); transform: translateY(2px); }
    @media (max-width: 440px) { .row { grid-template-columns: 1fr; } main { padding: 10px; } }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Moto Talk</h1>
      <div id="status">Ready</div>
    </section>

    <section id="pairCard" class="card">
      <div class="row">
        <button id="pttModeBtn" class="primary active">Push-to-talk</button>
        <button id="callModeBtn">Call + mute</button>
      </div>
      <br>
      <div class="row">
        <button id="offerBtn" class="blue">Make offer</button>
        <button id="useTextBtn" class="primary">Use text</button>
      </div>
      <br>
      <textarea id="signalText" spellcheck="false" autocomplete="off" autocapitalize="off" placeholder="Paste text here"></textarea>
      <br><br>
      <button id="copyBtn">Copy text</button>
    </section>

    <section id="talkCard" class="card hidden">
      <button id="talkBtn" class="talk primary">HOLD TO TALK</button>
      <br><br>
      <button id="hangupBtn" class="red">Disconnect</button>
    </section>

    <audio id="remoteAudio" autoplay playsinline></audio>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const statusEl = $('status');
    const pairCard = $('pairCard');
    const talkCard = $('talkCard');
    const signalText = $('signalText');
    const remoteAudio = $('remoteAudio');
    const talkBtn = $('talkBtn');
    const pttModeBtn = $('pttModeBtn');
    const callModeBtn = $('callModeBtn');
    const offerBtn = $('offerBtn');
    const useTextBtn = $('useTextBtn');
    const copyBtn = $('copyBtn');
    const hangupBtn = $('hangupBtn');

    let pc = null;
    let localStream = null;
    let role = '';
    let mode = 'ptt';
    let muted = true;

    function setStatus(text, state = '') {
      statusEl.textContent = text;
      statusEl.className = state;
    }

    function show(el) { el.classList.remove('hidden'); }
    function hide(el) { el.classList.add('hidden'); }

    function setMode(nextMode) {
      mode = nextMode;
      pttModeBtn.classList.toggle('active', mode === 'ptt');
      callModeBtn.classList.toggle('active', mode === 'call');
      applyMicMode();
    }

    async function ensureMic() {
      if (localStream) return localStream;
      if (!window.isSecureContext) {
        throw new Error('Needs HTTPS or localhost');
      }
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        video: false
      });
      applyMicMode();
      return localStream;
    }

    function setTrackEnabled(on) {
      if (!localStream) return;
      localStream.getAudioTracks().forEach(track => { track.enabled = on; });
    }

    function applyMicMode() {
      if (mode === 'ptt') {
        muted = true;
        setTrackEnabled(false);
        talkBtn.textContent = 'HOLD TO TALK';
        talkBtn.classList.remove('on');
      } else {
        muted = false;
        setTrackEnabled(true);
        talkBtn.textContent = 'MUTE';
        talkBtn.classList.add('on');
      }
    }

    function setPushTalk(on) {
      if (mode !== 'ptt') return;
      setTrackEnabled(on);
      talkBtn.textContent = on ? 'TALKING' : 'HOLD TO TALK';
      talkBtn.classList.toggle('on', on);
    }

    function toggleMute() {
      if (mode !== 'call') return;
      muted = !muted;
      setTrackEnabled(!muted);
      talkBtn.textContent = muted ? 'UNMUTE' : 'MUTE';
      talkBtn.classList.toggle('on', !muted);
    }

    function createPeer() {
      pc = new RTCPeerConnection({ iceServers: [] });
      pc.ontrack = event => {
        remoteAudio.srcObject = event.streams[0];
        remoteAudio.play().catch(() => {});
      };
      pc.onconnectionstatechange = updateConnectionState;
      pc.oniceconnectionstatechange = updateConnectionState;
      return pc;
    }

    function updateConnectionState() {
      const state = pc ? (pc.connectionState || pc.iceConnectionState) : 'closed';
      if (state === 'connected') {
        setStatus('Connected', 'good');
        hide(pairCard);
        show(talkCard);
        applyMicMode();
      } else if (state === 'failed' || state === 'disconnected') {
        setStatus('Connection lost', 'warn');
      } else if (state) {
        setStatus(state);
      }
    }

    function waitIceComplete(peer, timeoutMs = 5000) {
      return new Promise(resolve => {
        if (peer.iceGatheringState === 'complete') return resolve();
        const done = () => {
          clearTimeout(timer);
          peer.removeEventListener('icegatheringstatechange', check);
          resolve();
        };
        const check = () => { if (peer.iceGatheringState === 'complete') done(); };
        const timer = setTimeout(done, timeoutMs);
        peer.addEventListener('icegatheringstatechange', check);
      });
    }

    async function pack(obj) {
      const json = JSON.stringify(obj);
      const bytes = new TextEncoder().encode(json);
      if ('CompressionStream' in window) {
        const cs = new CompressionStream('gzip');
        const writer = cs.writable.getWriter();
        writer.write(bytes);
        writer.close();
        const compressed = new Uint8Array(await new Response(cs.readable).arrayBuffer());
        return 'MTTX1G.' + base64Url(compressed);
      }
      return 'MTTX1J.' + base64Url(bytes);
    }

    async function unpack(text) {
      const raw = (text || '').trim();
      if (!raw.startsWith('MTTX1')) throw new Error('Invalid text');
      const modeChar = raw.slice(5, 6);
      const data = fromBase64Url(raw.slice(7));
      let bytes = data;
      if (modeChar === 'G') {
        if (!('DecompressionStream' in window)) throw new Error('Unsupported browser');
        const ds = new DecompressionStream('gzip');
        const writer = ds.writable.getWriter();
        writer.write(data);
        writer.close();
        bytes = new Uint8Array(await new Response(ds.readable).arrayBuffer());
      }
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    function base64Url(bytes) {
      let binary = '';
      for (let i = 0; i < bytes.length; i += 0x8000) {
        binary += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
      }
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
    }

    function fromBase64Url(text) {
      const b64 = text.replace(/-/g, '+').replace(/_/g, '/') + '==='.slice((text.length + 3) % 4);
      const binary = atob(b64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function makeOffer() {
      role = 'host';
      setStatus('Making offer');
      await ensureMic();
      createPeer();
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      await pc.setLocalDescription(await pc.createOffer({ offerToReceiveAudio: true }));
      await waitIceComplete(pc);
      signalText.value = await pack({ v: 1, t: 'offer', s: pc.localDescription.sdp });
      setStatus('Offer ready', 'good');
    }

    async function processIncoming(text) {
      const msg = await unpack(text);
      if (msg.t === 'offer') return answerOffer(msg.s);
      if (msg.t === 'answer') return acceptAnswer(msg.s);
      throw new Error('Invalid text');
    }

    async function answerOffer(offerSdp) {
      role = 'join';
      setStatus('Making answer');
      await ensureMic();
      createPeer();
      localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      await pc.setRemoteDescription({ type: 'offer', sdp: offerSdp });
      await pc.setLocalDescription(await pc.createAnswer());
      await waitIceComplete(pc);
      signalText.value = await pack({ v: 1, t: 'answer', s: pc.localDescription.sdp });
      setStatus('Answer ready', 'good');
    }

    async function acceptAnswer(answerSdp) {
      if (!pc || role !== 'host') throw new Error('Make offer first');
      await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
      setStatus('Connecting');
    }

    function hangup() {
      if (pc) pc.close();
      pc = null;
      if (localStream) localStream.getTracks().forEach(track => track.stop());
      localStream = null;
      location.reload();
    }

    offerBtn.addEventListener('click', () => makeOffer().catch(err => setStatus(err.message, 'warn')));
    useTextBtn.addEventListener('click', () => processIncoming(signalText.value).catch(err => setStatus(err.message, 'warn')));
    copyBtn.addEventListener('click', async () => {
      if (!signalText.value.trim()) return;
      try {
        await navigator.clipboard.writeText(signalText.value.trim());
        setStatus('Copied');
      } catch (_) {
        signalText.select();
        document.execCommand('copy');
        setStatus('Copied');
      }
    });
    hangupBtn.addEventListener('click', hangup);
    pttModeBtn.addEventListener('click', () => setMode('ptt'));
    callModeBtn.addEventListener('click', () => setMode('call'));

    talkBtn.addEventListener('click', () => toggleMute());
    const talkOn = ev => { ev.preventDefault(); setPushTalk(true); };
    const talkOff = ev => { ev.preventDefault(); setPushTalk(false); };
    talkBtn.addEventListener('pointerdown', talkOn);
    talkBtn.addEventListener('pointerup', talkOff);
    talkBtn.addEventListener('pointercancel', talkOff);
    talkBtn.addEventListener('pointerleave', talkOff);
    talkBtn.addEventListener('touchstart', talkOn, { passive: false });
    talkBtn.addEventListener('touchend', talkOff, { passive: false });

    if ('serviceWorker' in navigator && window.isSecureContext) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
